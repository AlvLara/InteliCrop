<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Huerto Inteligente IoT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="register-card">
    <div class="logo-container">
        <img src="{{ url_for('static', filename='posible_logo.jpg') }}" alt="Logo Huerto Inteligente">
    </div>

    <h2>Crear Cuenta</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/registro" method="POST">
         <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="nombre">Nombre </label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Rubén Jurado" value="{{ nombre or '' }}" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" value="{{ email or '' }}" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirmar Contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">Registrarse</button>
    </form>

    <p class="footer-text">¿Ya tienes una cuenta? <a href="/login">Inicia sesión</a></p>
</div>

</body>
</html>
